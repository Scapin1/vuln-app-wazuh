name: CI (tests + Sonar)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r vuln-api/requirements.txt

      - name: Backend tests (pytest + coverage)
        working-directory: vuln-api
        env:
          # app/db.py requiere DATABASE_URL en import-time.
          DATABASE_URL: sqlite:///./ci.db
          # app/crypto.py requiere ENCRYPTION_KEY.
          # Clave Fernet dummy para CI (NO usar en prod).
          ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
        run: |
          pytest tests --cov=app --cov-report=xml:coverage.xml

      - name: Frontend tests (vitest + coverage)
        working-directory: frontend
        run: |
          npm ci
          npm run test:coverage

      - name: Validate Sonar configuration
        env:
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "${SONAR_ORGANIZATION}" ] || [ -z "${SONAR_PROJECT_KEY}" ]; then
            echo "::error::Faltan variables SONAR_ORGANIZATION y/o SONAR_PROJECT_KEY. Configuralas en GitHub: Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dproject.settings=dev-tools/sonarqube/sonar-project.properties
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
