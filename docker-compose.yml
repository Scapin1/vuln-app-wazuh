services:
  api:
    build: ./vuln-api
    container_name: api
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 10s
      timeout: 5s
      retries: 5
