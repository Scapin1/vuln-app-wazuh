services:
  db-api:
    image: timescale/timescaledb:latest-pg15
    container_name: db-api
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - LANG=C.UTF-8
    ports:
      - "${DB_PORT}:5432"    
    env_file:
      - .env
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./vuln-api/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./vuln-api
    container_name: api
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db-api:5432/${DB_NAME}
    depends_on:
      db-api:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9090:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: frontend
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  timescaledb_data:

networks:
  app-network:
    driver: bridge
