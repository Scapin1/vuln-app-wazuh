services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: wazuh
      POSTGRES_PASSWORD: wazuhpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - app-network

  sonarqube:
    image: sonarqube:9.9-community
    depends_on:
      - db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonarqube
      SONAR_JDBC_USERNAME: wazuh
      SONAR_JDBC_PASSWORD: wazuhpass
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - app-network

  api:
    build: ./vuln-api
    environment:
      DATABASE_URL: postgresql://wazuh:wazuhpass@db:5432/postgres

      # Wazuh Manager API (si lo usas para login/consultas)
      WAZUH_USER: wazuh-user
      WAZUH_PASSWORD: wazuh-pass
      WAZUH_API_URL: https://165.227.59.98:55000

      # Ajusta al endpoint real del Indexer (o deja temporal mientras pruebas ZAP)
      WAZUH_INDEXER_URL: https://165.227.59.98:9200

      SECRET_KEY: supersecret
    depends_on:
      - db
    ports:
      - "8000:8000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5

  jenkins:
    build: ./jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./reports:/reports
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    networks:
      - app-network

  zap:
    image: zaproxy/zap-weekly
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./reports:/zap/wrk
    command: >
      sh -c "echo 'Waiting for API...'; sleep 20;
      zap-baseline.py -t http://api:8000
      -r zap_report.html
      -J zap_report.json
      -m 2"
    networks:
      - app-network
    restart: "no"

volumes:
  postgres_data:
  jenkins_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  app-network:
    driver: bridge
