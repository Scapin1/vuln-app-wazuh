services:
  db-api:
    image: postgres:15
    container_name: db-api
    restart: unless-stopped
    env_file:
      - ./vuln-api/.env
    environment:
      POSTGRES_DB: vulnerabilidades_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    volumes:
      - postgres_api_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app-network

  api:
    build: ./vuln-api
    env_file:
      - ./vuln-api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-api:5432/${POSTGRES_DB}
    depends_on:
      - db-api
    ports:
      - "8000:8000"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_api_data:

networks:
  app-network:
    driver: bridge
