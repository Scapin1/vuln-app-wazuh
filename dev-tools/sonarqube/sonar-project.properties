# =========================
# Identidad del proyecto
# =========================
sonar.projectKey=vuln-app
sonar.projectName=Vuln App Wazuh

# =========================
# Código fuente
# =========================
# Analiza TODO el repo (para que SonarCloud cuente cambios en rutas nuevas)
sonar.sources=.

# Tests (mantener explícito)
sonar.tests=vuln-api/tests,frontend/tests

# =========================
# Lenguaje
# =========================
sonar.python.version=3.12
sonar.python.coverage.reportPaths=vuln-api/coverage.xml

# Cobertura de Javascript / Vue (Frontend)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# =========================
# Exclusiones
# =========================
# - Ignorar artefactos, dependencias y secretos
# - Ignorar tests dentro de sources (ya están en sonar.tests)
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/venv/**,**/.venv/**,**/.git/**,**/.idea/**,**/node_modules/**,**/dist/**,**/coverage/**,**/reports/**,vuln-api/tests/**,frontend/tests/**,**/certbot/**,**/nginx/ssl/**,**/*.crt,**/*.key,**/.env

# =========================
# Encoding
# =========================
sonar.sourceEncoding=UTF-8
