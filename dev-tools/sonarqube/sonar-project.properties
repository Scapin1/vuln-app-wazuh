# =========================
# Identidad del proyecto
# =========================
sonar.projectKey=vuln-app
sonar.projectName=Vuln App Wazuh

# =========================
# Código fuente
# =========================
# Analiza TODO el repo (para que SonarCloud cuente cambios aunque se creen rutas nuevas como backdb/)
sonar.sources=.

# Mantenerlo general por TIPO de archivo (no por ruta): evita falsos positivos en scripts/infra.
sonar.inclusions=**/*.py,**/*.js,**/*.ts,**/*.vue,**/*.jsx,**/*.tsx

# Tests (mantener explícito)
sonar.tests=vuln-api/tests,frontend/tests,backdb/tests

# =========================
# Lenguaje
# =========================
sonar.python.version=3.12
sonar.python.coverage.reportPaths=vuln-api/coverage.xml,backdb/coverage.xml

# Cobertura de Javascript / Vue (Frontend)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# =========================
# Exclusiones
# =========================
# - Ignorar artefactos, dependencias y secretos
# - Ignorar tests dentro de sources (ya están en sonar.tests)
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/venv/**,**/.venv/**,**/.git/**,**/.idea/**,**/node_modules/**,**/dist/**,**/coverage/**,**/reports/**,vuln-api/tests/**,frontend/tests/**,backdb/tests/**,**/certbot/**,**/nginx/ssl/**,**/*.crt,**/*.key,**/.env,**/*.sql

# =========================
# Encoding
# =========================
sonar.sourceEncoding=UTF-8
